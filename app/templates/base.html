<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyMate AI{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Spotify/Replit-inspired Color Palette */
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --bg-elevated: #21262d;

            --primary: #1db954;
            --primary-hover: #1ed760;
            --primary-dark: #169c46;

            --secondary: #00d4ff;
            --secondary-hover: #33ddff;

            --accent: #f57c00;
            --accent-hover: #ff8c1a;

            --success: #1db954;
            --warning: #ffa726;
            --danger: #f44336;
            --info: #00d4ff;

            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-tertiary: #6e7681;

            --border-primary: rgba(139, 148, 158, 0.2);
            --border-secondary: rgba(139, 148, 158, 0.1);

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 12px 48px rgba(0, 0, 0, 0.6);

            --glow-primary: 0 0 20px rgba(29, 185, 84, 0.4);
            --glow-secondary: 0 0 20px rgba(0, 212, 255, 0.4);
            --glow-accent: 0 0 20px rgba(245, 124, 0, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Subtle grid pattern background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(29, 185, 84, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(29, 185, 84, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient glow effects */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(29, 185, 84, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--text-primary);
        }

        code,
        pre {
            font-family: 'JetBrains Mono', monospace;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* Modern Alert Messages */
        .alert {
            padding: 16px 20px;
            margin: 20px 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid;
            position: relative;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .alert::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% {
                left: 100%;
            }
        }

        .alert-success {
            background: rgba(29, 185, 84, 0.15);
            border-color: var(--success);
            color: var(--primary-hover);
            box-shadow: var(--shadow-md), var(--glow-primary);
        }

        .alert-danger {
            background: rgba(244, 67, 54, 0.15);
            border-color: var(--danger);
            color: #ff6b6b;
            box-shadow: var(--shadow-md), 0 0 20px rgba(244, 67, 54, 0.3);
        }

        .alert-warning {
            background: rgba(255, 167, 38, 0.15);
            border-color: var(--warning);
            color: #ffb74d;
            box-shadow: var(--shadow-md), 0 0 20px rgba(255, 167, 38, 0.3);
        }

        .alert-info {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--info);
            color: var(--secondary-hover);
            box-shadow: var(--shadow-md), var(--glow-secondary);
        }

        .alert i {
            font-size: 1.3rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        /* Mobile Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 12px;
            }

            body {
                font-size: 14px;
            }

            h1 {
                font-size: 1.75rem !important;
            }

            h2 {
                font-size: 1.5rem !important;
            }

            h3 {
                font-size: 1.25rem !important;
            }

            .alert {
                padding: 12px 16px;
                font-size: 0.9rem;
            }

            .alert i {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem !important;
            }

            h2 {
                font-size: 1.3rem !important;
            }

            h3 {
                font-size: 1.1rem !important;
            }

            .alert {
                padding: 10px 14px;
                font-size: 0.85rem;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Selection */
        ::selection {
            background: rgba(29, 185, 84, 0.3);
            color: var(--text-primary);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="container">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
            <i
                class="bi bi-{% if category == 'success' %}check-circle-fill{% elif category == 'danger' %}exclamation-triangle-fill{% elif category == 'warning' %}exclamation-circle-fill{% else %}info-circle-fill{% endif %}"></i>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}

    <script>
        // Auto-dismiss alerts after 3 seconds
        document.addEventListener('DOMContentLoaded', function () {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function (alert) {
                setTimeout(function () {
                    alert.classList.add('fade-out');
                    // Remove from DOM after transition completes
                    setTimeout(function () {
                        alert.remove();
                    }, 500);
                }, 3000);
            });
        });
    </script>
</body>

</html>
